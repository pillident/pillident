<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Welcome Page</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" type="module" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Your Interactive Space</h1>
    </header>
    <main>
        <p>This is a demonstration of what I can build. Below is an interactive element.</p>
        <interactive-card 
            title="Hello, Developer!" 
            message="Click me to see a little bit of magic.">
        </interactive-card>
    </main>
    <footer>
        <p>Built with Gemini</p>
    </footer>
</body>
</html>
